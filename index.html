<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaMart - General Store</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fa;
}

header{
background:#111827;
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo{
color:white;
font-size:28px;
font-weight:700;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav ul li a{
color:white;
text-decoration:none;
font-weight:500;
}

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
background:linear-gradient(-45deg,#667eea,#764ba2,#6dd5ed,#2193b0);
background-size:400% 400%;
animation:gradient 10s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.hero h1{
font-size:60px;
margin-bottom:15px;
}

.hero p{
font-size:20px;
margin-bottom:25px;
}

.btn{
padding:14px 30px;
border:none;
border-radius:30px;
background:white;
font-weight:600;
cursor:pointer;
}

.section-title{
text-align:center;
font-size:38px;
padding:50px 0 25px;
}

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:0 8% 40px;
}

.category{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.category:hover{
transform:translateY(-8px);
}

.products{
padding:20px 8% 60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.product{
background:white;
border-radius:15px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.product img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.product h3{
margin-top:15px;
}

.price{
font-size:22px;
font-weight:700;
color:#2563eb;
margin:10px 0;
}

.cart-btn{
background:#2563eb;
color:white;
border:none;
padding:10px 20px;
border-radius:25px;
cursor:pointer;
}

footer{
background:#111827;
color:white;
text-align:center;
padding:25px;
}

@media(max-width:768px){
.hero h1{
font-size:38px;
}
}
</style></head>
<body><header>
<div class="logo">🛒 NovaMart</div><nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#categories">Categories</a></li>
<li><a href="#products">Products</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>
</header><section class="hero">
<div>
<h1>Welcome To NovaMart</h1>
<p>Shop Fashion, Electronics, Watches & Accessories</p>
<button class="btn" onclick="document.getElementById('categories').scrollIntoView()">Shop Now</button>
</div>
</section><h2 class="section-title" id="categories">Categories</h2><div class="categories">
<div class="category" onclick="showCategory('fashion')">👕 Fashion</div>
<div class="category" onclick="showCategory('electronics')">📱 Electronics</div>
<div class="category" onclick="showCategory('watches')">⌚ Watches</div>
<div class="category" onclick="showCategory('accessories')">🎧 Accessories</div>
</div><h2 class="section-title">Products</h2><div class="products" id="products"></div><footer>
<h3>NovaMart Store</h3>
<p>© 2026 All Rights Reserved</p>
</footer><script>
const data = {
fashion:[
["T-Shirt","₹799","https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800"],
["Jeans","₹1499","https://images.unsplash.com/photo-1542272604-787c3835535d?w=800"],
["Jacket","₹2499","https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=800"]
],

electronics:[
["Smartphone","₹24999","https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800"],
["Laptop","₹54999","https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=800"],
["Camera","₹34999","https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=800"]
],

watches:[
["Smart Watch","₹3999","https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800"],
["Luxury Watch","₹5999","https://images.unsplash.com/photo-1434056886845-dac89ffe9b56?w=800"],
["Classic Watch","₹2999","https://images.unsplash.com/photo-1508057198894-247b23fe5ade?w=800"]
],

accessories:[
["Headphones","₹1999","https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800"],
["Sunglasses","₹999","https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=800"],
["Backpack","₹1499","https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=800"]
]
};

function showCategory(category){
let html = "";

data[category].forEach(item=>{
html += `
<div class="product">
<img src="${item[2]}">
<h3>${item[0]}</h3>
<div class="price">${item[1]}</div>
<button class="cart-btn" onclick="addCart('${item[0]}')">Add To Cart</button>
</div>
`;
});

document.getElementById("products").innerHTML = html;
document.getElementById("products").scrollIntoView({behavior:"smooth"});
}

function addCart(name){
alert(name + " Added To Cart 🛒");
}
</script></body>
</html>
